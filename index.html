<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BxNcm DJ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #1e1e1e;
      z-index: 10000;
      -webkit-app-region: drag;
    }
    .loading-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 280px;
    }
    .app-title {
      font-size: 22px;
      font-weight: 600;
      color: #00b5e5;
      letter-spacing: 2px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #00b5e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .task-text {
      font-size: 13px;
      color: #888;
      min-height: 20px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #00b5e5;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-container">
      <div class="app-title">BxNcm DJ</div>
      <div class="spinner"></div>
      <div class="task-text" id="task-text">正在启动...</div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/renderer/main.ts"></script>
</body>
</html>
