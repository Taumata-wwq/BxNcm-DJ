appId: com.taumata.bxncmdj
productName: BxNcm DJ

directories:
  output: release
  buildResources: build

files:
  - dist-electron
  - dist
  - package.json
  - README.md
  - "!**/*.map"
  - "!**/node_modules/.cache"
  - "!**/node_modules/.bin"

includeSubNodeModules: true

compression: maximum

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BxNcm DJ
  uninstallDisplayName: BxNcm DJ
  menuCategory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  artifactName: "BxNcm.DJ.Setup.${version}.${ext}"

portable:
  artifactName: ${productName}-${version}-portable.${ext}

asar: true

asarUnpack:
  - "**/node_modules/ws/**"
  - "**/node_modules/qrcode/**"
  - "**/node_modules/electron-updater/**"

# 托盘图标资源
extraResources:
  - from: build/icon.ico
    to: icon.ico

# GitHub 自动更新发布配置
publish:
  - provider: github
    owner: Taumata-wwq
    repo: BxNcm-DJ
    releaseType: release

afterPack: "./scripts/after-pack.cjs"